<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pessoas</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #7B2FF7, #F107A3);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 480px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            animation: fadeIn 0.6s ease;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #7B2FF7;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 700;
        }

        label {
            font-weight: 600;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            font-size: 1rem;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ccc;
            margin-bottom: 18px;
            outline: none;
            transition: 0.3s;
            background-color: #fafafa;
        }

        input:focus, textarea:focus {
            border-color: #7B2FF7;
            box-shadow: 0 0 5px rgba(123, 47, 247, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #7B2FF7, #F107A3);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #5f1ad4, #d0068f);
        }

        #painel, #agenda {
            display: none;
        }

        #resposta, #respostaAgenda {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #555;
            background: #f9f9f9;
            border-left: 4px solid #7B2FF7;
            padding: 10px;
            border-radius: 6px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            h2 {
                font-size: 1.4rem;
            }
            button {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="inicio">
            <h2>Login</h2>
            <p>Usuário:<br><input type="text" id="cpfs"></p>
            <p>Senha:<br><input type="password" id="senha"></p>
            <button onclick="logar()">Logar</button> 
        </div>

        <div id="painel">
            <h2>Painel de Controle</h2>
            <p>CPF:<br><input type="text" id="cpf"></p>
            <p>Nome:<br><input type="text" id="nome"></p>
            <p>Contato:<br><input type="text" id="contato"></p>
            <p>Senha:<br><input type="password" id="senhaPainel"></p>
            
            <button onclick="agendar()">Agendar</button>
            <button onclick="inserir()">Inserir</button>
            <button onclick="atualizar()">Atualizar</button>
            <button onclick="deletar()">Deletar</button>
            <button onclick="voltar()">Voltar</button>
            <button id="consulta">Consultar</button>
            <p id="resposta"></p>
        </div>

        <div id="agenda">
            <h2>Agenda</h2>
            <p>CPF:<br><input type="text" id="cpfAgenda"></p>
            <p>Data:<br><input type="date" id="data"></p>
            <p>Horário:<br><input type="time" id="horario"></p>
            <p>Descrição:<br><textarea id="descricao"></textarea></p>

            <button onclick="inserirAge()">Agendar</button>
            <button onclick="deletarAge()">Apagar</button>
            <button onclick="atualizarAge()">Atualizar</button>
            <button onclick="consultarAge()">Consultar</button>
            <button onclick="voltar2()">Voltar</button>
            <p id="respostaAgenda"></p>
        </div>
    </div>

    <script>
        function voltar(){
        document.getElementById("inicio").style.display = "block";
        document.getElementById("painel").style.display = "none";
        }
        function voltar2(){
        document.getElementById("painel").style.display = "block";
        document.getElementById("agenda").style.display = "none";   
        }
        function logar() {
            var cpf = document.getElementById("cpfs").value;
            var senha = document.getElementById("senha").value;
            
            var requisicao = new XMLHttpRequest();
            requisicao.open("GET", "http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerPessoa.php?cpf=" + cpf + "&senha=" + senha + "&acao=validaPessoa");
            requisicao.send();

            requisicao.onload = function() {
                var resposta = JSON.parse(this.responseText);
                if (resposta.length > 0) {
                    document.getElementById("inicio").style.display = "none";
                    document.getElementById("painel").style.display = "block";
                }
            }
        }

        function inserir() {
            var cpf = document.getElementById("cpf").value;  
            var nome = document.getElementById("nome").value;  
            var contato = document.getElementById("contato").value;  
            var senha = document.getElementById("senhaPainel").value;  
           
            var requisicao = new XMLHttpRequest();
            requisicao.open("GET", "http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerPessoa.php?cpf=" + cpf + "&nome=" + nome + "&contato=" + contato + "&senha=" + senha + "&acao=inserir");
            requisicao.send();

            requisicao.onload = function() {
                document.querySelector("#resposta").innerHTML = this.responseText;
            }
        }

        function atualizar() {
            var cpf = document.getElementById("cpf").value;
            var nome = document.getElementById("nome").value;  
            var contato = document.getElementById("contato").value;  
            var senha = document.getElementById("senhaPainel").value;  

            var requisicao = new XMLHttpRequest();
            requisicao.open("GET", "http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerPessoa.php?cpf=" + cpf + "&nome=" + nome + "&contato=" + contato + "&senha=" + senha + "&acao=atualizar");
            requisicao.send();

            requisicao.onload = function() {
                document.querySelector("#resposta").innerHTML = this.responseText;
            }
        }

        function deletar() {
            var cpf = document.getElementById('cpf').value;
            var requisicao = new XMLHttpRequest();
            requisicao.open("GET", `http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerPessoa.php?cpf=${cpf}&acao=apagar`);
            requisicao.send();

            requisicao.onload = function() {
                document.querySelector("#resposta").innerHTML = this.responseText;
            }
        }

        function consulta() {
            var requisicao = new XMLHttpRequest();
            requisicao.open("GET", "http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerPessoa.php?acao=consultar");
            requisicao.send();

            requisicao.onload = function() {
                var pessoas = JSON.parse(this.responseText);
                var resultado = ""; 
                for (let i = 0; i < pessoas.length; i++) {
                    resultado += "<br><br><strong>PESSOA " + (i + 1) + "</strong>" +
                    "<br>CPF: " + pessoas[i].cpf +
                    "<br>NOME: " + pessoas[i].nome +
                    "<br>CONTATO: " + pessoas[i].contato;
                }
                document.querySelector("#resposta").innerHTML = resultado;
            }
        }
        document.querySelector("#consulta").onclick = consulta;

        function agendar() {
            document.getElementById("painel").style.display = "none";
            document.getElementById("agenda").style.display = "block";
        }

        function inserirAge() {
            var descricao = document.getElementById("descricao").value;
            var data = document.getElementById("data").value;
            var cpf = document.getElementById("cpfAgenda").value;
            var horario = document.getElementById("horario").value;

            var requi = new XMLHttpRequest();
            requi.open("GET", `http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerAgenda.php?cpf=${cpf}&data=${data}&descricao=${descricao}&horario=${horario}&acao=inserir`);
            requi.send();
        }

        function deletarAge() {
            var cpf = document.getElementById("cpfAgenda").value;
            var data = document.getElementById("data").value;
            var horario = document.getElementById("horario").value;

            var requi = new XMLHttpRequest();
            requi.open("GET", `http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerAgenda.php?cpf=${cpf}&data=${data}&horario=${horario}&acao=apagar`);
            requi.send();
        }

        function atualizarAge() {
            var cpf = document.getElementById("cpfAgenda").value;
            var data = document.getElementById("data").value;
            var descricao = document.getElementById("descricao").value;
            var horario = document.getElementById("horario").value;

            var requi = new XMLHttpRequest();
            requi.open("GET", `http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerAgenda.php?cpf=${cpf}&data=${data}&descricao=${descricao}&horario=${horario}&acao=atualizar`);
            requi.send();
        }

        function consultarAge() {
            var cpf = document.getElementById("cpfAgenda").value;
            var req = new XMLHttpRequest();
            req.open("GET", `http://localhost/Atividade-do-Paulo/SistemaPessoaKW/controllerAgenda.php?cpf=${cpf}&acao=consultar`);
            req.send();

            req.onload = function() {
                var agendamentos = JSON.parse(this.responseText);
                var resul = "";
                for (let i = 0; i < agendamentos.length; i++) {
                    resul += `<br><strong>(${i + 1})</strong>
                    <br>CPF: ${agendamentos[i].cpf}
                    <br>Data: ${agendamentos[i].data}
                    <br>Horário: ${agendamentos[i].horario}
                    <br>Descrição: ${agendamentos[i].descricao}<br>`;
                }
                document.querySelector("#respostaAgenda").innerHTML = resul;
            }
        }
    </script>
</body>
</html>
